{% extends "base.html" %}

{% block content %}

<h2>Election Results</h2>

<canvas id="chart" width="400" height="200"></canvas>

<br>

<table>

    <tr>
        <th>Candidate</th>
        <th>Votes</th>
    </tr>

    {% for candidate,count in results.items() %}

    <tr>
        <td>{{ candidate }}</td>
        <td>{{ count }}</td>
    </tr>

    {% endfor %}

</table>
<br>

<a href="/admin_result_pdf">
    <button>Download Result PDF</button>
</a>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

    const labels = {{ results.keys() | list | tojson }};
    const values = {{ results.values() | list | tojson }};

    const ctx = document.getElementById("chart").getContext("2d");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Votes",
                data: values
            }]
        },
        options: {
            responsive: true
        }
    });

</script>

{% endblock %}
